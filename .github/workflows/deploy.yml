name: Deploy woman

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 85.239.54.244
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR=/var/www/people
            APP_NAME=people

            cd "$APP_DIR"

            echo "📥 Sync..."
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Install..."
            npm install

            echo "🏗 Build..."
            npm run build

            echo "🚀 Restart backend..."
            pm2 delete "$APP_NAME" || true
            PORT=3003 pm2 start "$APP_DIR/server.js" --name "$APP_NAME" --cwd "$APP_DIR" --update-env
            pm2 save

            echo "🩺 Check local API..."
            curl -fsS http://127.0.0.1:3003/api/content >/dev/null

            echo "🌐 Update nginx route for CMS API..."
            install -m 0644 "$APP_DIR/deploy/nginx-people.evtenia.ru.conf" /etc/nginx/sites-available/people.evtenia.ru.conf
            ln -sf /etc/nginx/sites-available/people.evtenia.ru.conf /etc/nginx/sites-enabled/people.evtenia.ru.conf
            nginx -t
            systemctl reload nginx

            echo "🩺 Check public API..."
            curl -fsS https://people.evtenia.ru/api/content >/dev/null

            echo "✅ Done"
