name: Deploy woman

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 85.239.54.244
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR=/var/www/people
            APP_NAME=people

            wait_for_api() {
              local url="$1"
              local label="$2"
              for attempt in $(seq 1 30); do
                if curl -fsS "$url" >/dev/null; then
                  echo "$label is ready"
                  return 0
                fi
                sleep 1
              done

              echo "$label did not become ready"
              pm2 status "$APP_NAME" || true
              pm2 logs "$APP_NAME" --lines 80 --nostream || true
              return 1
            }

            cd "$APP_DIR"

            echo "📥 Sync..."
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Install..."
            npm install

            echo "🏗 Build..."
            npm run build

            echo "🚀 Restart backend..."
            pm2 delete "$APP_NAME" || true
            PORT=3003 pm2 start "$APP_DIR/server.js" --name "$APP_NAME" --cwd "$APP_DIR" --update-env
            pm2 save

            echo "🩺 Check local API..."
            wait_for_api http://127.0.0.1:3003/api/content "Local API"

            echo "🌐 Update nginx route for CMS API..."
            APP_PORT=3003 node "$APP_DIR/deploy/configure-nginx.js"
            nginx -t
            systemctl reload nginx

            echo "🩺 Check public API..."
            wait_for_api https://people.evtenia.ru/api/content "Public API"

            echo "✅ Done"
