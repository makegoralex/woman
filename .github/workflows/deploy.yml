name: Deploy woman

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 85.239.54.244
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR=/var/www/people
            APP_NAME=people

            cd "$APP_DIR"

            echo "📥 Pull..."
            git pull origin main

            echo "📦 Install..."
            npm install

            echo "🏗 Build..."
            npm run build

            echo "🚀 Restart backend..."
            pm2 restart "$APP_NAME" --update-env || pm2 start server.js --name "$APP_NAME"
            pm2 save

            echo "✅ Done"
