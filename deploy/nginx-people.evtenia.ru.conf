# Nginx server block snippet for people.evtenia.ru.
# Put the proxy locations before generic static/root locations so CMS requests
# are not handled by nginx as static files (which can cause 405 for POST/PUT).

upstream people_evtenia_node {
    server 127.0.0.1:3003;
    keepalive 16;
}

server {
    server_name people.evtenia.ru;

    # SSL/listen directives are usually managed by certbot or the host panel.
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/people.evtenia.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/people.evtenia.ru/privkey.pem;

    client_max_body_size 250m;

    location ^~ /api/ {
        proxy_pass http://people_evtenia_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /cms/ {
        proxy_pass http://people_evtenia_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /uploads/ {
        proxy_pass http://people_evtenia_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin/content {
        proxy_pass http://people_evtenia_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin/upload {
        proxy_pass http://people_evtenia_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://people_evtenia_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
